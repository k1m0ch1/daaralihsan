name: Update Instagram Gallery

on:
  schedule:
    - cron: '0 5 * * *'   # 12:00 WIB (05:00 UTC)
    - cron: '0 11 * * *'  # 18:00 WIB (11:00 UTC)
  workflow_dispatch:       # allow manual trigger from GitHub UI

jobs:
  update-gallery:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Install Playwright browsers (Chromium only)
        run: playwright install chromium --with-deps

      - name: Check for new Instagram posts
        id: gallery
        run: python scripts/update_gallery.py

      - name: Commit and push (only if new posts found)
        if: steps.gallery.outputs.gallery_updated == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add \
            public/galeri/ \
            app/components/Galeri.js \
            scripts/gallery_posts.json
          git commit -m "chore: sync Instagram gallery $(TZ='Asia/Jakarta' date +'%Y-%m-%d %H:%M WIB')"
          git push

      - name: No new posts
        if: steps.gallery.outputs.gallery_updated != 'true'
        run: echo "Gallery is already up to date — skipping deploy."
